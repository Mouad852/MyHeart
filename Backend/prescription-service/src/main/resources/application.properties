# =============================================
# Prescription Service Configuration
# =============================================

spring.application.name=prescription-service
server.port=8085

# Eureka
eureka.client.service-url.defaultZone=http://${EUREKA_HOST:localhost}:8761/eureka/
eureka.instance.prefer-ip-address=true

# DataSource
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5437/prescriptiondb
spring.datasource.username=${DB_USER:prescription_user}
spring.datasource.password=${DB_PASS:prescription_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.com.medical=DEBUG
