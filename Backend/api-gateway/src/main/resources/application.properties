# ============================================================
# API GATEWAY - Application Configuration
# ============================================================

spring.application.name=api-gateway
server.port=8080

# ============================================================
# EUREKA SERVICE DISCOVERY
# ============================================================
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ============================================================
# SPRING CLOUD GATEWAY ROUTES
#
# Each route has:
#   id        - unique name for the route
#   uri       - target service (lb:// = load-balanced via Eureka)
#   predicates- conditions to match (Path)
#   filters   - transformations (StripPrefix removes the path prefix)
#
# lb://patient-service means: "ask Eureka for the address of
# the service registered as 'patient-service'"
# ============================================================

# ── Patient Service Route ──────────────────────────────────
spring.cloud.gateway.routes[0].id=patient-service
spring.cloud.gateway.routes[0].uri=lb://patient-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/patients/**
# No StripPrefix here — /patients/** passes through as-is

# ── Doctor Service Route ───────────────────────────────────
spring.cloud.gateway.routes[1].id=doctor-service
spring.cloud.gateway.routes[1].uri=lb://doctor-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/doctors/**

# ── Appointment Service Route ──────────────────────────────
spring.cloud.gateway.routes[2].id=appointment-service
spring.cloud.gateway.routes[2].uri=lb://appointment-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/appointments/**

# ── Eureka Dashboard (proxy through gateway) ──────────────
spring.cloud.gateway.routes[3].id=eureka-server
spring.cloud.gateway.routes[3].uri=http://eureka-server:8761
spring.cloud.gateway.routes[3].predicates[0]=Path=/eureka/**

# ============================================================
# GLOBAL CORS CONFIGURATION
# Allows frontend apps to call the gateway from a browser
# ============================================================
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*

# Enable Eureka-based load balancing
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ============================================================
# ACTUATOR
# ============================================================
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always
management.endpoint.gateway.enabled=true

# ============================================================
# LOGGING
# ============================================================
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.com.medical.apigateway=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
