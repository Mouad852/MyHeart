# =============================================
# Lab Service Configuration
# =============================================

spring.application.name=lab-service
server.port=8008

# Eureka
eureka.client.service-url.defaultZone=http://${EUREKA_HOST:localhost}:8761/eureka/
eureka.instance.prefer-ip-address=true

# DataSource
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5438/labdb
spring.datasource.username=${DB_USER:lab_user}
spring.datasource.password=${DB_PASS:lab_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# File upload simulation (local storage)
lab.results.storage-path=/tmp/lab-results

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.com.medical=DEBUG
