# ============================================================
# DOCTOR SERVICE - Application Configuration
# ============================================================

spring.application.name=doctor-service
server.port=8082

# ============================================================
# DATABASE - PostgreSQL (doctordb)
# ============================================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5434/doctordb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# EUREKA SERVICE DISCOVERY
# ============================================================
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.hostname=doctor-service
eureka.instance.prefer-ip-address=true

# ============================================================
# ACTUATOR
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ============================================================
# LOGGING
# ============================================================
logging.level.com.medical.doctorservice=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
