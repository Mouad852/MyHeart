# ============================================================
# EUREKA SERVER - Application Configuration
# ============================================================

spring.application.name=eureka-server
server.port=8761

# ============================================================
# EUREKA CONFIGURATION
# ============================================================
# Don't register itself as a client
eureka.client.register-with-eureka=false
# Don't fetch registry from itself
eureka.client.fetch-registry=false

# Eureka server URL (used for display/self-reference)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Reduce eviction interval for faster local dev feedback
eureka.server.eviction-interval-timer-in-ms=5000

# Dashboard
eureka.dashboard.enabled=true
eureka.dashboard.path=/

# ============================================================
# ACTUATOR
# ============================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ============================================================
# LOGGING
# ============================================================
logging.level.com.netflix.eureka=INFO
logging.level.com.netflix.discovery=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
